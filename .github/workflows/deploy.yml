name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Runs every hour — keeps resume in sync with Shiva1325/Resume repo
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Sync latest resume from Resume repo
        run: |
          curl -L \
            "https://github.com/Shiva1325/Resume/raw/main/resume.pdf" \
            -o public/resume.pdf \
            --fail \
            && echo "Resume updated" \
            || echo "Resume download failed — keeping existing"
          echo "{\"synced\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > public/resume-meta.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ''
