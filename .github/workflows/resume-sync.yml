name: Resume Sync

# Triggers when you push to your Shiva1325/Resume repo via repository_dispatch,
# or run manually from the Actions tab.

on:
  repository_dispatch:
    types: [resume-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio source
        uses: actions/checkout@v4

      - name: Download latest resume PDF from Resume repo
        run: |
          curl -L \
            "https://github.com/Shiva1325/Resume/raw/main/resume.pdf" \
            -o public/resume.pdf \
            --fail \
            || echo "Download failed — keeping existing resume.pdf"

      - name: Commit updated resume
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          git diff --staged --quiet || git commit -m "chore: sync resume from Resume repo [skip ci]"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Deploy
        run: npm run build
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
