<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" type="image/png" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shiva Patibandla — Software Engineer. Full-stack developer building scalable, impactful products." />
    <meta name="theme-color" content="#050A0E" />
    <title>Shiva Patibandla — Software Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function() {
        var canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        var ctx = canvas.getContext('2d');
        var link = document.getElementById('favicon');
        var frame = 0;
        function draw() {
          frame++;
          var t = frame * 0.04;
          var pulse = 0.5 + 0.5 * Math.sin(t * 1.8);
          var glow = 0.4 + 0.6 * Math.abs(Math.sin(t));
          // Background
          ctx.fillStyle = '#050A0E';
          ctx.fillRect(0, 0, 32, 32);
          // Outer ring
          ctx.beginPath();
          ctx.arc(16, 16, 14, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(249,115,22,' + (0.35 + 0.35 * pulse) + ')';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Radial glow
          var g = ctx.createRadialGradient(16,16,2,16,16,13);
          g.addColorStop(0, 'rgba(249,115,22,' + (0.25 * pulse) + ')');
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, 32, 32);
          // Letter
          ctx.save();
          ctx.shadowBlur = 10 * glow;
          ctx.shadowColor = '#F97316';
          ctx.fillStyle = 'rgba(249,115,22,' + (0.85 + 0.15 * pulse) + ')';
          ctx.font = 'bold 13px "Space Grotesk", monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('SS', 16, 17);
          ctx.restore();
          link.href = canvas.toDataURL('image/png');
          requestAnimationFrame(draw);
        }
        draw();
      })();
    </script>
  </body>
</html>
